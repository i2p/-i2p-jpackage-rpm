name: Build RPM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:41

    steps:
      - name: Install build tools
        run: |
          dnf install -y \
            rpm-build rpmdevtools \
            java-17-openjdk-devel ant gettext \
            systemd-rpm-macros \
            curl bzip2 git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build RPM
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-rpm.sh

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: i2p-rpms
          path: output/*.rpm

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download RPM artifacts
        uses: actions/download-artifact@v4
        with:
          name: i2p-rpms
          path: output/

      - name: Run install tests
        run: |
          chmod +x scripts/*.sh
          ./scripts/test-install.sh
